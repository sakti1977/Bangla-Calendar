- id: kali_puja
  name_bn: কালীপূজা
  name_en: Kali Puja
  tradition: hindu
  regions: [WB, BD]
  is_public_holiday: false
  rule:
    type: tithi_based
    tithi: 14
    paksha: krishna
    lunar_month: 8   # Kartik (Amanta)
    critical_window: midnight
    tie_break: midnight_prevailing

- id: diwali_bd
