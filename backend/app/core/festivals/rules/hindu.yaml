  tradition: hindu
  regions: [WB, BD]
  is_public_holiday: false
  rule:
    type: tithi_based
    tithi: 15    # Amavasya (tithi 30 = index 29; but Amavasya is counted as 15 Krishna)
    paksha: krishna
    lunar_month: 8
    critical_window: midnight
    tie_break: midnight_prevailing

