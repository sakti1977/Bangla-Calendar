# Hindu festival rules — tithi-based observances
# lunar_month uses the Amanta (new-moon-to-new-moon) convention month numbering
# where month 1 = Chaitra, month 7 = Ashwin (autumn), month 8 = Kartik

- id: durga_puja_shashti
  name_bn: মহাষষ্ঠী
  name_en: Maha Shashti (Durga Puja)
  tradition: hindu
  regions: [WB, BD]
  is_public_holiday: true
  rule:
    type: tithi_based
    tithi: 6
    paksha: shukla
    lunar_month: 7   # Ashwin (Amanta)
    critical_window: pradosh
    tie_break: next_day_if_spans_two

- id: durga_puja_saptami
  name_bn: মহাসপ্তমী
  name_en: Maha Saptami (Durga Puja)
  tradition: hindu
  regions: [WB, BD]
  is_public_holiday: true
  rule:
    type: tithi_based
    tithi: 7
    paksha: shukla
    lunar_month: 7
    critical_window: sunrise
    tie_break: prevailing_at_sunrise

- id: durga_puja_ashtami
  name_bn: মহাঅষ্টমী
