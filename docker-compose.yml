services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bangla_calendar
      POSTGRES_USER: bcal
      POSTGRES_PASSWORD: bcal_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcal -d bangla_calendar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/ephemeris:/app/ephemeris
    environment:
      DATABASE_URL: postgresql+asyncpg://bcal:bcal_dev@postgres:5432/bangla_calendar
      REDIS_URL: redis://redis:6379
      EPHEMERIS_PATH: /app/ephemeris
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"

volumes:
  pgdata:
